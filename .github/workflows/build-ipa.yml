name: build-ipa

# Собирает голый (unsigned) .ipa на macOS-раннере GitHub.
#  • push в main           → сборка + выкладка в rolling-prerelease «nightly»
#  • push тега vX.Y.Z       → сборка + стабильный GitHub Release
#  • ручной запуск          → только сборка (артефакт)
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write          # нужно для публикации релизов

jobs:
  build:
    runs-on: macos-15      # на macos-15 стоит Xcode 16 (нужен для objectVersion 77)
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode 16.x
        # Берём самый свежий установленный Xcode 16.x: его iphonesimulator SDK
        # совпадает с установленным на раннере runtime симулятора. Прибитый 16.0
        # (SDK 18.0) валит actool: нужного ему runtime iOS 18.0 на раннере нет.
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          echo "Выбран: $XC"
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: Build unsigned .ipa
        env:
          WLC_BUILD_NUMBER: ${{ github.run_number }}   # монотонный номер сборки
        run: ./build-ipa.sh

      - name: Read app version
        id: ver
        run: |
          V=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" WhitelistChecker/Info.plist)
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhitelistChecker-unsigned
          path: dist/WhitelistChecker-unsigned.ipa
          if-no-files-found: error

      # --- Nightly: один скользящий prerelease, всегда указывает на свежий main ---
      - name: Publish nightly
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          SHA="${GITHUB_SHA:0:7}"
          # пересоздаём тег/релиз nightly на текущем коммите
          gh release delete nightly --yes --cleanup-tag || true
          gh release create nightly dist/WhitelistChecker-unsigned.ipa \
            --prerelease --target "$GITHUB_SHA" \
            --title "Nightly v${VERSION}" \
            --notes "Автосборка из коммита \`${SHA}\` ($(date -u '+%Y-%m-%d %H:%M UTC')).
          Unsigned .ipa — подпиши своим сертификатом (Sideloadly / Feather / Gbox) перед установкой."

      # --- Стабильный релиз по тегу vX.Y.Z ---
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/WhitelistChecker-unsigned.ipa \
            --title "${GITHUB_REF_NAME}" \
            --notes "Релиз ${GITHUB_REF_NAME}. Unsigned .ipa — подпиши перед установкой." \
          || gh release upload "${GITHUB_REF_NAME}" dist/WhitelistChecker-unsigned.ipa --clobber
